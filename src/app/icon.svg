<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#080d14"/>
  <!-- Outer diamond -->
  <polygon points="16,2 30,16 16,30 2,16" fill="none" stroke="#00ff8c" stroke-width="1.5"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#00ff8c" stroke-width="1" opacity="0.55"/>
  <!-- Center fill -->
  <circle cx="16" cy="16" r="2" fill="#00ff8c"/>
  <!-- Diamond tip dots -->
  <circle cx="16" cy="2"  r="1.2" fill="#00ff8c"/>
  <circle cx="30" cy="16" r="1.2" fill="#00ff8c"/>
  <circle cx="16" cy="30" r="1.2" fill="#00ff8c"/>
  <circle cx="2"  cy="16" r="1.2" fill="#00ff8c"/>
</svg>
